version: 1
names:
  family: Apple Color Emoji
bitmap:
  format: cbdt_cblc
  strikes:
    - 96
  transforms:
    flip_directional_variants: true
  png:
    compress: true
    max_colors: 128
    prefer_pngquant: true
tables:
  drop:
    source_tables: true
    outlines: true
    vertical_metrics: true
    after_shaping:
      - GDEF
      - GPOS
      - bgcl
      - feat
      - meta
      - trak
      - DSIG
  cmap:
    bmp: true
    ucs4: true
  metrics:
    policy: browser_safe
    fs_type: installable
shaping:
  gsub:
    enabled: true
    sequence_files:
      - ../sequences/emoji-sequences.txt
      - ../sequences/emoji-zwj-sequences.txt
      - ../sequences/emoji-test.txt
      - ../sequences/emoji-variation-sequences.txt
    project_sequence_files:
      - ../sequences/project-sequences.txt
    replace_morx: true
split:
  enabled: true
  chunk_kb: 500
  write_css: true
