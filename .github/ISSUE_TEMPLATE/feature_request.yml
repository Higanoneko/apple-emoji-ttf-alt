name: Feature Request
description: Suggest a new feature or improvement
labels: []
body:
  - type: checkboxes
    id: prerequisites
    attributes:
      label: Before you start
      description: These help us triage your request faster.
      options:
        - label: I have read the [README.md](https://github.com/samuelngs/apple-emoji-ttf/blob/v2/README.md)
          required: false
        - label: I have searched [existing issues](https://github.com/samuelngs/apple-emoji-ttf/issues) to make sure this hasn't been requested already
          required: false

  - type: textarea
    id: problem
    attributes:
      label: Problem
      description: What problem does this feature solve? Is it related to a frustration?
      placeholder: I'm always frustrated when...
    validations:
      required: true

  - type: textarea
    id: solution
    attributes:
      label: Proposed Solution
      description: Describe the solution you'd like.
    validations:
      required: true

  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives Considered
      description: Any alternative solutions or features you've considered.
    validations:
      required: false

  - type: textarea
    id: additional
    attributes:
      label: Additional Context
      description: Any other context, screenshots, or examples.
    validations:
      required: false
