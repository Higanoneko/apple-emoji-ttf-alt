name: Bug Report
description: Report a bug with Apple Color Emoji on Linux or Windows
labels: []
body:
  - type: checkboxes
    id: prerequisites
    attributes:
      label: Before you start
      description: These help us triage your issue faster.
      options:
        - label: I have read the [README.md](https://github.com/samuelngs/apple-emoji-ttf/blob/v2/README.md) and followed the installation instructions
          required: false
        - label: I am using the latest release from the [Releases](https://github.com/samuelngs/apple-emoji-ttf/releases) page
          required: false
        - label: I have searched [existing issues](https://github.com/samuelngs/apple-emoji-ttf/issues) to make sure this hasn't been reported already
          required: false

  - type: input
    id: os
    attributes:
      label: Operating System / Distribution
      description: e.g. Ubuntu 24.04, Arch Linux, Windows 11, Fedora 41
      placeholder: Ubuntu 24.04
    validations:
      required: true

  - type: dropdown
    id: install-method
    attributes:
      label: Installation Method
      description: How did you install the font?
      options:
        - .deb package (Ubuntu / Debian)
        - .rpm package (Fedora / RHEL)
        - .pkg.tar.zst (Arch Linux)
        - Manual install (copied TTF + fontconfig)
        - Windows (replaced seguiemj.ttf)
        - Built from source
    validations:
      required: true

  - type: textarea
    id: description
    attributes:
      label: Bug Description
      description: Describe what's happening and what you expected instead.
      placeholder: Describe the bug...
    validations:
      required: true

  - type: textarea
    id: steps
    attributes:
      label: Steps to Reproduce
      description: Steps to reproduce the behavior (optional, but helpful for debugging).
      placeholder: |
        1. Install the font using ...
        2. Open ...
        3. See error / incorrect rendering
    validations:
      required: false

  - type: textarea
    id: screenshots
    attributes:
      label: Screenshots
      description: If applicable, add screenshots to help explain the problem.
    validations:
      required: false

  - type: textarea
    id: additional
    attributes:
      label: Additional Context
      description: Any other information that might be helpful (fontconfig output, application version, etc.).
    validations:
      required: false
