name: Close stale issues

on:
  schedule:
    - cron: "0 0 * * *"
  workflow_dispatch:

permissions:
  issues: write

jobs:
  stale:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/stale@v9
        with:
          days-before-stale: 14
          days-before-close: 7
          stale-issue-label: stale
          exempt-issue-labels: bug,enhancement
          stale-issue-message: >
            This issue has been automatically marked as stale because it has not
            had any activity for 14 days. It will be closed in 7 days if no
            further activity occurs. If this is still relevant, please leave a
            comment or add a `bug` or `enhancement` label to keep it open.
          close-issue-message: >
            This issue has been automatically closed due to inactivity. If you
            believe this is still relevant, please open a new issue with updated
            information.
          days-before-pr-stale: -1
          days-before-pr-close: -1
