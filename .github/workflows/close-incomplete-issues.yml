name: Close incomplete issues

on:
  issues:
    types: [opened]

permissions:
  issues: write

jobs:
  check-completeness:
    if: contains(github.event.issue.body, 'Before you start')
    runs-on: ubuntu-latest
    steps:
      - name: Check bug report completeness
        uses: actions/github-script@v7
        with:
          script: |
            function validateIssue(body) {
              const isBugReport = body.includes('### Bug Description');
              const isFeatureRequest = body.includes('### Proposed Solution');

              if (!isBugReport && !isFeatureRequest) return null;

              // Checkboxes are marked optional in the GitHub form (so users who
              // didn't actually do these things will leave them unchecked instead
              // of blindly checking required boxes). But we still enforce them here.
              const sharedCheckboxes = [
                'I have read the',
                'I have searched',
              ];

              const bugCheckboxes = isBugReport
                ? ['I am using the latest release']
                : [];

              const requiredCheckboxes = [...sharedCheckboxes, ...bugCheckboxes];

              const requiredFields = isBugReport
                ? [
                    { id: 'Operating System / Distribution', heading: '### Operating System / Distribution' },
                    { id: 'Installation Method', heading: '### Installation Method' },
                    { id: 'Bug Description', heading: '### Bug Description' },
                  ]
                : [
                    { id: 'Problem', heading: '### Problem' },
                    { id: 'Proposed Solution', heading: '### Proposed Solution' },
                  ];

              const issueType = isBugReport ? 'bug report' : 'feature request';
              const missingCheckboxes = [];
              const missingFields = [];

              for (const label of requiredCheckboxes) {
                const checked = new RegExp(`\\[x\\]\\s.*${label.replace(/[.*+?^${}()|[\]\\]/g, '\\$&')}`, 'i');
                const unchecked = new RegExp(`\\[ \\]\\s.*${label.replace(/[.*+?^${}()|[\]\\]/g, '\\$&')}`, 'i');
                if (unchecked.test(body) || !checked.test(body)) {
                  missingCheckboxes.push(`- [ ] "${label}..."`);
                }
              }

              for (const field of requiredFields) {
                const headingEscaped = field.heading.replace(/[.*+?^${}()|[\]\\]/g, '\\$&');
                const sectionMatch = body.match(new RegExp(`${headingEscaped}\\s*\\n([\\s\\S]*?)(?=###|$)`));
                if (!sectionMatch || !sectionMatch[1].trim() || sectionMatch[1].trim() === '_No response_') {
                  missingFields.push(`- [ ] ${field.id}`);
                }
              }

              const missing = [...missingCheckboxes, ...missingFields];
              return { missing, missingCheckboxes, missingFields, issueType };
            }

            const body = context.payload.issue.body || '';
            const issueNumber = context.payload.issue.number;

            const result = validateIssue(body);
            if (!result) return;

            const { missing, missingCheckboxes, missingFields, issueType } = result;

            if (missing.length > 0) {

              let comment;

              if (missingCheckboxes.length > 0 && missingFields.length === 0) {
                comment = `Hey, it looks like you skipped a few steps before opening this ${issueType}. ` +
                  `We ask everyone to read through the ` +
                  `[README](https://github.com/samuelngs/apple-emoji-ttf/blob/v2/README.md), ` +
                  `search existing issues, and make sure they're on the latest release before reporting. ` +
                  `This helps us avoid chasing issues that are already answered or fixed.\n\n` +
                  `If you still run into problems after going through all of that, open a new issue and we'll be happy to help.`;
              } else if (missingFields.length > 0 && missingCheckboxes.length === 0) {
                comment = `This ${issueType} is missing some required info:\n\n` +
                  missingFields.join('\n') +
                  `\n\nPlease open a new issue with all the fields filled in so we can help you out.`;
              } else {
                comment = `Hey, this ${issueType} is missing some required info and it looks like ` +
                  `the prep steps weren't done either. Please read through the ` +
                  `[README](https://github.com/samuelngs/apple-emoji-ttf/blob/v2/README.md), ` +
                  `search existing issues, and make sure you're on the latest release.\n\n` +
                  `These fields also need to be filled in:\n\n` +
                  missingFields.join('\n') +
                  `\n\nIf you're still having trouble after all that, open a new issue with ` +
                  `everything filled in and we'll take a look.`;
              }

              await github.rest.issues.createComment({
                ...context.repo,
                issue_number: issueNumber,
                body: comment,
              });

              await github.rest.issues.addLabels({
                ...context.repo,
                issue_number: issueNumber,
                labels: ['incomplete'],
              });

              await github.rest.issues.update({
                ...context.repo,
                issue_number: issueNumber,
                state: 'closed',
                state_reason: 'not_planned',
              });
            }
